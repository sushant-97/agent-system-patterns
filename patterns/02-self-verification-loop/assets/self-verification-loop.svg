<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="520" viewBox="0 0 1160 520" role="img" aria-labelledby="title desc">
  <title id="title">Self-verification loop</title>
  <desc id="desc">Original diagram showing build, behavioral verification, evidence capture, repair, and rerun.</desc>
  <rect width="1160" height="520" fill="#fbfaf7"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="48" y="58" font-size="28" font-weight="700" fill="#1f2937">Self-Verification Loop</text>
    <text x="48" y="88" font-size="15" fill="#4b5563">The agent is not done until behavior passes an executable scenario.</text>
  </g>
  <g font-family="Avenir Next, Helvetica, sans-serif">
    <g transform="translate(68 155)">
      <rect width="170" height="112" rx="8" fill="#ffffff" stroke="#d6d3d1"/>
      <text x="20" y="38" font-size="15" font-weight="700" fill="#111827">Build</text>
      <text x="20" y="68" font-size="13" fill="#57534e">agent creates</text>
      <text x="20" y="88" font-size="13" fill="#57534e">candidate artifact</text>
    </g>
    <g transform="translate(308 155)">
      <rect width="190" height="112" rx="8" fill="#ecfeff" stroke="#67e8f9"/>
      <text x="20" y="38" font-size="15" font-weight="700" fill="#155e75">Verify</text>
      <text x="20" y="68" font-size="13" fill="#164e63">execute scenario</text>
      <text x="20" y="88" font-size="13" fill="#164e63">not just render check</text>
    </g>
    <g transform="translate(568 155)">
      <rect width="190" height="112" rx="8" fill="#fff7ed" stroke="#fdba74"/>
      <text x="20" y="38" font-size="15" font-weight="700" fill="#9a3412">Evidence</text>
      <text x="20" y="68" font-size="13" fill="#7c2d12">state, logs, UI text</text>
      <text x="20" y="88" font-size="13" fill="#7c2d12">failure details</text>
    </g>
    <g transform="translate(828 155)">
      <rect width="190" height="112" rx="8" fill="#f0fdf4" stroke="#86efac"/>
      <text x="20" y="38" font-size="15" font-weight="700" fill="#166534">Repair</text>
      <text x="20" y="68" font-size="13" fill="#166534">target failed evidence</text>
      <text x="20" y="88" font-size="13" fill="#166534">rerun verifier</text>
    </g>
    <line x1="238" y1="211" x2="298" y2="211" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="498" y1="211" x2="558" y2="211" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="758" y1="211" x2="818" y2="211" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 918 278 C 850 382, 410 382, 404 278" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
    <text x="70" y="444" font-size="14" fill="#57534e">Key idea: completion is a claim. Verification turns it into evidence.</text>
  </g>
</svg>

