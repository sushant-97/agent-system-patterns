<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="520" viewBox="0 0 1160 520" role="img" aria-labelledby="title desc">
  <title id="title">Snapshot fork promote pipeline</title>
  <desc id="desc">Original diagram showing canonical workspace, checkpoint, forked sandbox, verification, merge policy, rejection, and promotion.</desc>
  <rect width="1160" height="520" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-family="Inter, Arial, sans-serif">
    <text x="48" y="54" font-size="26" font-weight="700" fill="#0f172a">Reversible Sandbox Execution</text>
    <text x="48" y="84" font-size="15" fill="#475569">The agent works in a fork. The canonical workspace changes only after verification and merge policy approval.</text>

    <g transform="translate(54 150)">
      <rect width="170" height="112" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="18" y="36" font-size="15" font-weight="700" fill="#0f172a">Canonical</text>
      <text x="18" y="64" font-size="13" fill="#475569">files</text>
      <text x="18" y="84" font-size="13" fill="#475569">database</text>
    </g>

    <g transform="translate(278 150)">
      <rect width="170" height="112" rx="8" fill="#ecfeff" stroke="#67e8f9"/>
      <text x="18" y="36" font-size="15" font-weight="700" fill="#155e75">Checkpoint</text>
      <text x="18" y="64" font-size="13" fill="#164e63">immutable</text>
      <text x="18" y="84" font-size="13" fill="#164e63">audit anchor</text>
    </g>

    <g transform="translate(502 150)">
      <rect width="170" height="112" rx="8" fill="#fefce8" stroke="#fde047"/>
      <text x="18" y="36" font-size="15" font-weight="700" fill="#713f12">Sandbox</text>
      <text x="18" y="64" font-size="13" fill="#713f12">agent edits</text>
      <text x="18" y="84" font-size="13" fill="#713f12">isolated state</text>
    </g>

    <g transform="translate(726 150)">
      <rect width="170" height="112" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="18" y="36" font-size="15" font-weight="700" fill="#0f172a">Verification</text>
      <text x="18" y="64" font-size="13" fill="#475569">invariants</text>
      <text x="18" y="84" font-size="13" fill="#475569">diff risk</text>
    </g>

    <g transform="translate(950 150)">
      <rect width="170" height="112" rx="8" fill="#f0fdf4" stroke="#86efac"/>
      <text x="18" y="36" font-size="15" font-weight="700" fill="#166534">Promote</text>
      <text x="18" y="64" font-size="13" fill="#166534">allowed diff</text>
      <text x="18" y="84" font-size="13" fill="#166534">canonical update</text>
    </g>

    <line x1="224" y1="206" x2="268" y2="206" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="448" y1="206" x2="492" y2="206" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="672" y1="206" x2="716" y2="206" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="896" y1="206" x2="940" y2="206" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(728 330)">
      <rect width="250" height="94" rx="8" fill="#fef2f2" stroke="#fecaca"/>
      <text x="18" y="36" font-size="15" font-weight="700" fill="#991b1b">Reject path</text>
      <text x="18" y="64" font-size="13" fill="#7f1d1d">keep audit record, discard sandbox</text>
    </g>
    <path d="M 810 268 L 810 320" fill="none" stroke="#991b1b" stroke-width="2" marker-end="url(#arrow)"/>

    <text x="54" y="468" font-size="14" fill="#475569">Key idea: rollback is cheap only if the agent's attempt is isolated before it touches durable state.</text>
  </g>
</svg>

