<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">Decision-time guidance control loop</title>
  <desc id="desc">An original diagram showing trajectory events flowing through signal extraction, classification, guidance selection, and ephemeral injection.</desc>
  <rect width="1120" height="420" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-family="Inter, Arial, sans-serif">
    <text x="48" y="54" font-size="26" font-weight="700" fill="#0f172a">Decision-Time Guidance</text>
    <text x="48" y="82" font-size="15" fill="#475569">Observe the trajectory, inject one small control only when the current decision needs it.</text>

    <g transform="translate(48 140)">
      <rect width="190" height="110" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="20" y="34" font-size="16" font-weight="700" fill="#0f172a">Trajectory</text>
      <text x="20" y="62" font-size="13" fill="#475569">messages</text>
      <text x="20" y="82" font-size="13" fill="#475569">tool results</text>
      <text x="20" y="102" font-size="13" fill="#475569">errors + diffs</text>
    </g>

    <g transform="translate(308 140)">
      <rect width="190" height="110" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="20" y="34" font-size="16" font-weight="700" fill="#0f172a">Signals</text>
      <text x="20" y="62" font-size="13" fill="#475569">repeated error</text>
      <text x="20" y="82" font-size="13" fill="#475569">edit/fail loop</text>
      <text x="20" y="102" font-size="13" fill="#475569">risky command</text>
    </g>

    <g transform="translate(568 140)">
      <rect width="190" height="110" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="20" y="34" font-size="16" font-weight="700" fill="#0f172a">Selector</text>
      <text x="20" y="62" font-size="13" fill="#475569">score</text>
      <text x="20" y="82" font-size="13" fill="#475569">budget</text>
      <text x="20" y="102" font-size="13" fill="#475569">cooldown</text>
    </g>

    <g transform="translate(828 140)">
      <rect width="220" height="110" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="20" y="34" font-size="16" font-weight="700" fill="#0f172a">Ephemeral Guidance</text>
      <text x="20" y="62" font-size="13" fill="#475569">short instruction</text>
      <text x="20" y="82" font-size="13" fill="#475569">specific evidence</text>
      <text x="20" y="102" font-size="13" fill="#475569">not persisted</text>
    </g>

    <line x1="238" y1="195" x2="298" y2="195" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="498" y1="195" x2="558" y2="195" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="758" y1="195" x2="818" y2="195" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <path d="M 938 258 C 900 340, 220 340, 144 258" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
    <text x="418" y="365" font-size="14" fill="#475569">After the next decision, observe again. Do not accumulate reminders.</text>
  </g>
</svg>
