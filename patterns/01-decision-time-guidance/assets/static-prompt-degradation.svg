<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Static prompt reminders degrade with accumulation</title>
  <desc id="desc">Original reconstruction of the Replit blog's first technical idea: adding reminders to a static prompt can reduce targeted failure but increases tool usage, confusion, and looping.</desc>
  <rect width="1120" height="520" fill="#ffffff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-family="Inter, Arial, sans-serif">
    <text x="48" y="54" font-size="26" font-weight="700" fill="#111827">Static Prompt Reminder Accumulation</text>
    <text x="48" y="84" font-size="15" fill="#4b5563">A reminder can fix one behavior, but adding every reminder to every turn creates competing context.</text>

    <g transform="translate(70 130)">
      <rect width="230" height="260" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="24" y="42" font-size="17" font-weight="700" fill="#0f172a">Base agent prompt</text>
      <text x="24" y="82" font-size="13" fill="#475569">task instruction</text>
      <text x="24" y="108" font-size="13" fill="#475569">tool policy</text>
      <text x="24" y="134" font-size="13" fill="#475569">style constraints</text>
    </g>

    <line x1="318" y1="260" x2="408" y2="260" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(430 130)">
      <rect width="260" height="260" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="24" y="42" font-size="17" font-weight="700" fill="#9a3412">More static reminders</text>
      <text x="24" y="82" font-size="13" fill="#7c2d12">do not use mock data</text>
      <text x="24" y="108" font-size="13" fill="#7c2d12">read logs before editing</text>
      <text x="24" y="134" font-size="13" fill="#7c2d12">ask for help if stuck</text>
      <text x="24" y="160" font-size="13" fill="#7c2d12">avoid repeated changes</text>
      <text x="24" y="186" font-size="13" fill="#7c2d12">verify before finishing</text>
    </g>

    <line x1="710" y1="260" x2="800" y2="260" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(820 130)">
      <rect width="230" height="260" rx="8" fill="#fef2f2" stroke="#fecaca"/>
      <text x="24" y="42" font-size="17" font-weight="700" fill="#991b1b">Side effects</text>
      <text x="24" y="82" font-size="13" fill="#7f1d1d">longer context</text>
      <text x="24" y="108" font-size="13" fill="#7f1d1d">more tool calls</text>
      <text x="24" y="134" font-size="13" fill="#7f1d1d">more looping</text>
      <text x="24" y="160" font-size="13" fill="#7f1d1d">less task focus</text>
    </g>

    <text x="70" y="450" font-size="14" fill="#4b5563">Repo interpretation: static reminders are global controls. Decision-time guidance should be local, evidence-triggered, and temporary.</text>
  </g>
</svg>

