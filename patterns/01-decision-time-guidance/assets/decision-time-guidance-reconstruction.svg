<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Decision-time guidance reconstruction</title>
  <desc id="desc">Original reconstruction of the Replit blog's second technical idea: monitor the trajectory, classify the current decision, and inject targeted guidance only when relevant.</desc>
  <rect width="1120" height="560" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-family="Inter, Arial, sans-serif">
    <text x="48" y="54" font-size="26" font-weight="700" fill="#0f172a">Decision-Time Guidance</text>
    <text x="48" y="84" font-size="15" fill="#475569">Keep the base prompt stable. Add a short, evidence-backed nudge only for the next decision.</text>

    <g transform="translate(60 145)">
      <rect width="210" height="120" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="20" y="38" font-size="16" font-weight="700" fill="#0f172a">Agent trajectory</text>
      <text x="20" y="70" font-size="13" fill="#475569">messages, tool calls</text>
      <text x="20" y="94" font-size="13" fill="#475569">errors, tests, diffs</text>
    </g>

    <g transform="translate(350 110)">
      <rect width="250" height="190" rx="8" fill="#ecfeff" stroke="#67e8f9"/>
      <text x="22" y="38" font-size="16" font-weight="700" fill="#155e75">Guidance classifier</text>
      <text x="22" y="72" font-size="13" fill="#164e63">is this a mock-data risk?</text>
      <text x="22" y="98" font-size="13" fill="#164e63">is this a stuck loop?</text>
      <text x="22" y="124" font-size="13" fill="#164e63">is this an unsafe tool call?</text>
      <text x="22" y="150" font-size="13" fill="#164e63">is a reminder useful now?</text>
    </g>

    <g transform="translate(680 145)">
      <rect width="220" height="120" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="20" y="38" font-size="16" font-weight="700" fill="#0f172a">Guidance card</text>
      <text x="20" y="70" font-size="13" fill="#475569">one short instruction</text>
      <text x="20" y="94" font-size="13" fill="#475569">with observed evidence</text>
    </g>

    <g transform="translate(680 345)">
      <rect width="220" height="115" rx="8" fill="#f0fdf4" stroke="#86efac"/>
      <text x="20" y="38" font-size="16" font-weight="700" fill="#166534">Next agent turn</text>
      <text x="20" y="70" font-size="13" fill="#166534">uses temporary guidance</text>
      <text x="20" y="94" font-size="13" fill="#166534">then guidance expires</text>
    </g>

    <line x1="270" y1="205" x2="340" y2="205" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="600" y1="205" x2="670" y2="205" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="790" y1="268" x2="790" y2="335" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

    <path d="M 675 405 C 455 500, 185 405, 165 280" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
    <text x="98" y="505" font-size="14" fill="#475569">Repo interpretation: guidance is a runtime control loop, not a larger static prompt.</text>
  </g>
</svg>

